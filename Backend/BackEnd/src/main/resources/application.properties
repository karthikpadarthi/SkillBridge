spring.application.name=BackEnd
app.ai.enabled=true
app.ai.api-key={my open api key}
app.ai.base-url=https://api.openai.com
app.ai.model=gpt-4o-mini
app.ai.timeout-ms=15000
app.ai.use-response-format=true
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/skill_bridge}
spring.data.mongodb.auto-index-creation=true
server.port=8081
app.jwt.secret=${APP_JWT_SECRET:local-dev-jwt-secret-change-me-2026-min-32-bytes}
app.jwt.expiration-ms=86400000
